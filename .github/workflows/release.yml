name: Release

on:
  push:
    # Semver tags without a "v" prefix, e.g. 0.2.0 or 1.4.0-rc1.
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build, e.g. 0.2.0'
        required: true
        default: '0.0.0-dev'

permissions:
  contents: write   # required to create the release + attach binaries

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - id: set
        run: |
          # Tags are bare semver (no "v" prefix), e.g. refs/tags/1.2.3.
          # Manual dispatch supplies inputs.version directly.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

  build:
    needs: version
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
            rid: osx-arm64
            artifact: AvrdudeUI-macos-arm64.tar.gz
          - name: linux-x64
            runner: ubuntu-latest
            rid: linux-x64
            artifact: AvrdudeUI-linux-x64.tar.gz
          - name: windows-x64
            runner: windows-latest
            rid: win-x64
            artifact: AvrdudeUI-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ---------- macOS: build the full .app bundle via build.sh ----------
      - name: Build .app (macOS)
        if: matrix.rid == 'osx-arm64'
        env:
          VERSION: ${{ needs.version.outputs.version }}
          RID: osx-arm64
        run: |
          chmod +x build/build.sh
          ./build/build.sh
          # Pack the bundle preserving the app structure (permissions, code signature).
          cd build
          tar -czf "${{ matrix.artifact }}" AvrdudeUI.app
          ls -lh "${{ matrix.artifact }}"

      # ---------- Linux + Windows: publish + package output dir ----------
      - name: Publish + package (Linux/Windows)
        if: matrix.rid != 'osx-arm64'
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # AssemblyVersion/FileVersion must be strictly numeric — drop the -suffix.
          NUMERIC_VERSION="${VERSION%%-*}"
          ASM_VERSION="$NUMERIC_VERSION"
          # Pad up to four numeric segments.
          while [[ "$(echo "$ASM_VERSION" | awk -F. '{print NF}')" -lt 4 ]]; do
              ASM_VERSION="$ASM_VERSION.0"
          done

          dotnet publish src/AvrdudeUI/AvrdudeUI.csproj \
              -c Release \
              -r "${{ matrix.rid }}" \
              --self-contained true \
              -p:PublishSingleFile=false \
              -p:Version="$VERSION" \
              -p:AssemblyVersion="$ASM_VERSION" \
              -p:FileVersion="$ASM_VERSION" \
              -o "build/publish/${{ matrix.rid }}"

          mkdir -p "build/staging/AvrdudeUI"
          cp -R "build/publish/${{ matrix.rid }}/." "build/staging/AvrdudeUI/"

          # Windows exe needs no chmod; Linux binary does.
          if [[ "${{ matrix.rid }}" == linux-* ]]; then
              chmod +x "build/staging/AvrdudeUI/AvrdudeUI"
          fi

          cd build/staging
          if [[ "${{ matrix.artifact }}" == *.zip ]]; then
              # Prefer the runner's zip on Windows for correct path separators.
              if command -v pwsh >/dev/null 2>&1; then
                  pwsh -Command "Compress-Archive -Path 'AvrdudeUI' -DestinationPath '../${{ matrix.artifact }}'"
              else
                  zip -r "../${{ matrix.artifact }}" AvrdudeUI
              fi
          else
              tar -czf "../${{ matrix.artifact }}" AvrdudeUI
          fi
          cd ..
          ls -lh "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [version, build]
    # Only auto-publish a GitHub Release on tag pushes. Manual runs just leave
    # the artifacts attached to the workflow run so you can inspect them.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AvrdudeUI ${{ needs.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            dist/AvrdudeUI-macos-arm64.tar.gz
            dist/AvrdudeUI-linux-x64.tar.gz
            dist/AvrdudeUI-windows-x64.zip
          body: |
            ## Install

            **macOS (Apple Silicon)** — `brew install avrdude` first (required),
            then download `AvrdudeUI-macos-arm64.tar.gz`, extract, and move
            `AvrdudeUI.app` to `/Applications`. Right-click ▸ Open on first launch
            (the bundle is ad-hoc signed, not notarized).

            **Linux (x64)** — install `avrdude` from your package manager, then
            download `AvrdudeUI-linux-x64.tar.gz`, extract, and run `./AvrdudeUI`.

            **Windows (x64)** — install `avrdude` (e.g. from
            https://github.com/avrdudes/avrdude/releases), then download
            `AvrdudeUI-windows-x64.zip`, extract, and run `AvrdudeUI.exe`.

            Auto-generated changelog below.
